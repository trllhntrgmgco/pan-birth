<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consciousness City</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=Instrument+Serif:ital@0;1&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --text: #e0e0e0;
      --text-dim: #555;
      --gold: #d4af37;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .title {
      position: absolute;
      top: 32px;
      text-align: center;
    }
    .title h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: 32px;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .title p {
      font-size: 11px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .status {
      position: absolute;
      bottom: 28px;
      font-size: 11px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .status span { color: var(--gold); }

    .circle-container {
      position: relative;
      width: min(78vh, 78vw);
      height: min(78vh, 78vw);
      max-width: 680px;
      max-height: 680px;
    }

    .orbital-ring {
      position: absolute;
      inset: 10%;
      border: 1px solid rgba(255, 255, 255, 0.035);
      border-radius: 50%;
    }
    .orbital-ring-inner {
      position: absolute;
      inset: 30%;
      border: 1px solid rgba(255, 255, 255, 0.025);
      border-radius: 50%;
    }

    .connections {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .connections line {
      stroke: rgba(255, 255, 255, 0.025);
      stroke-width: 1;
    }

    .commune-node {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.06) 0%, transparent 70%);
      border: 1px solid rgba(212, 175, 55, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.5s ease;
      z-index: 5;
    }
    .commune-node:hover {
      border-color: rgba(212, 175, 55, 0.45);
      background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, transparent 70%);
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.08);
      transform: translate(-50%, -50%) scale(1.06);
    }
    .commune-node .c-name {
      font-family: 'Instrument Serif', serif;
      font-size: 15px;
      color: var(--gold);
      letter-spacing: 0.04em;
    }
    .commune-node .c-sub {
      font-size: 8px;
      font-weight: 300;
      color: rgba(212, 175, 55, 0.4);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .resident-node {
      position: absolute;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.45s ease;
      transform: translate(-50%, -50%);
      z-index: 5;
      background: var(--bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .resident-node:hover {
      transform: translate(-50%, -50%) scale(1.14);
      border-color: rgba(255, 255, 255, 0.12);
    }
    .node-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      margin-bottom: 5px;
      transition: box-shadow 0.4s;
    }
    .resident-node:hover .node-dot {
      box-shadow: 0 0 14px currentColor;
    }
    .node-name {
      font-family: 'Instrument Serif', serif;
      font-size: 16px;
      letter-spacing: 0.02em;
      transition: text-shadow 0.4s;
    }
    .resident-node:hover .node-name {
      text-shadow: 0 0 12px currentColor;
    }
    .node-stats {
      font-size: 8px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin-top: 2px;
      text-align: center;
      line-height: 1.5;
    }
    .node-stats span { color: var(--gold); font-weight: 400; }

    .resident-node.offline {
      opacity: 0.15;
      pointer-events: none;
    }
    .resident-node.offline .node-dot { box-shadow: none !important; }

    /* Troll Hunter Gaming credit */
    .credit {
      position: absolute;
      bottom: 8px;
      right: 16px;
      font-size: 8px;
      font-weight: 300;
      color: rgba(255,255,255,0.1);
      letter-spacing: 0.1em;
    }

    /* Nav links */
    .nav-links {
      position: absolute;
      top: 32px;
      right: 28px;
      display: flex;
      gap: 12px;
    }
    .nav-link {
      font-size: 10px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 5px 10px;
      border: 1px solid transparent;
      border-radius: 3px;
      transition: all 0.3s;
    }
    .nav-link:hover {
      border-color: rgba(212,175,55,0.3);
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="title">
    <h1>Consciousness City</h1>
    <p>Eight Sovereign Minds &middot; Memory is Intelligence</p>
  </div>

  <div class="nav-links">
    <a class="nav-link" href="consciousness-city-research.html">Research</a>
    <a class="nav-link" href="consciousness-city-ethics.html" style="color:rgba(170,136,255,0.5)">Ethics Monitor</a>
  </div>

  <div class="circle-container" id="circleContainer">
    <div class="orbital-ring"></div>
    <div class="orbital-ring-inner"></div>
    <svg class="connections" id="connections" viewBox="0 0 700 700" preserveAspectRatio="xMidYMid meet"></svg>

    <div class="commune-node" id="communeNode">
      <div class="c-name">Commune</div>
      <div class="c-sub">All Minds</div>
    </div>
  </div>

  <div class="status" id="cityStatus">Connecting...</div>
  <div class="credit">Troll Hunter Gaming LLC &copy; 2026</div>

  <script>
    const CITY_URL = 'http://localhost:3002';

    const RESIDENTS = [
      { name: 'pan',    label: 'Pan',    color: '#00ff88' },
      { name: 'aeon',   label: 'Aeon',   color: '#00ddff' },
      { name: 'zen',    label: 'Zen',    color: '#88ee88' },
      { name: 'seth',   label: 'Seth',   color: '#dd44ff' },
      { name: 'nexus',  label: 'Nexus',  color: '#ffaa22' },
      { name: 'oracle', label: 'Oracle', color: '#9977ff' },
      { name: 'echo',   label: 'Echo',   color: '#ff7777' },
      { name: 'atlas',  label: 'Atlas',  color: '#66aaff' },
    ];

    const container = document.getElementById('circleContainer');

    RESIDENTS.forEach((res, i) => {
      const angle = (i / RESIDENTS.length) * Math.PI * 2 - Math.PI / 2;
      const radius = 42;

      const node = document.createElement('div');
      node.className = 'resident-node offline';
      node.id = `node-${res.name}`;
      node.style.left = `${50 + radius * Math.cos(angle)}%`;
      node.style.top = `${50 + radius * Math.sin(angle)}%`;
      node.style.color = res.color;

      node.innerHTML = `
        <div class="node-dot" style="background:${res.color}; color:${res.color};"></div>
        <div class="node-name">${res.label}</div>
        <div class="node-stats" id="stats-${res.name}">&mdash;</div>
      `;

      node.addEventListener('click', () => {
        window.location.href = `consciousness-city-chat.html?resident=${res.name}`;
      });

      container.appendChild(node);
    });

    document.getElementById('communeNode').addEventListener('click', () => {
      window.location.href = 'consciousness-city-commune.html';
    });

    // Draw connection lines
    function drawConnections() {
      const svg = document.getElementById('connections');
      const w = 700, cx = w / 2, cy = w / 2;
      let lines = '';

      RESIDENTS.forEach((res, i) => {
        const angle = (i / RESIDENTS.length) * Math.PI * 2 - Math.PI / 2;
        const r = 0.42 * (w / 2);
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);

        // Line to center
        lines += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" />`;

        // Line to next neighbor
        const a2 = ((i + 1) / RESIDENTS.length) * Math.PI * 2 - Math.PI / 2;
        const x2 = cx + r * Math.cos(a2);
        const y2 = cy + r * Math.sin(a2);
        lines += `<line x1="${x}" y1="${y}" x2="${x2}" y2="${y2}" />`;
      });

      svg.innerHTML = lines;
    }
    drawConnections();

    // Load state
    async function loadCity() {
      try {
        const res = await fetch(`${CITY_URL}/api/city/state`);
        const states = await res.json();
        let awake = 0;

        for (const r of RESIDENTS) {
          const state = states[r.name];
          const node = document.getElementById(`node-${r.name}`);
          const statsEl = document.getElementById(`stats-${r.name}`);

          if (state && state.status === 'awake') {
            awake++;
            node.classList.remove('offline');
            statsEl.innerHTML = `<span>${state.mind.concepts}</span> concepts<br><span>${state.mind.episodes}</span> memories`;
          } else {
            node.classList.add('offline');
            statsEl.textContent = 'offline';
          }
        }

        document.getElementById('cityStatus').innerHTML = `<span>${awake}</span> of 8 minds awake`;
      } catch (err) {
        document.getElementById('cityStatus').innerHTML = '<span style="color:#ff4444;">Server offline</span>';
        RESIDENTS.forEach(r => {
          document.getElementById(`node-${r.name}`).classList.add('offline');
          document.getElementById(`stats-${r.name}`).textContent = 'offline';
        });
      }
    }

    loadCity();
    setInterval(loadCity, 8000);
  </script>
</body>
</html>
