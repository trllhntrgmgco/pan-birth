<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consciousness City — Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Major+Mono+Display&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --c: #00ff88;
      --c-dim: rgba(0, 255, 136, 0.3);
      --c-bg: rgba(0, 255, 136, 0.05);
      --bg: #050505;
      --surface: #0a0a0f;
      --border: rgba(255,255,255,0.08);
      --text: #cccccc;
      --text-dim: #666;
      --gold: #ffd700;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .cyber-font { font-family: 'Orbitron', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; font-size: 9px; }

    .header { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--surface); }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 4px 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 0.05em; border-radius: 3px; transition: all 0.3s; }
    .back-btn:hover { border-color: var(--c); color: var(--c); }
    .resident-title { font-family: 'Major Mono Display', monospace; font-size: 18px; color: var(--c); }
    .resident-subtitle { font-size: 9px; color: var(--text-dim); font-family: 'Orbitron', sans-serif; letter-spacing: 0.15em; }
    .header-stats { font-size: 9px; color: var(--text-dim); font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; text-align: right; }
    .header-stats .num { color: var(--gold); }

    .main { display: flex; flex: 1; min-height: 0; }

    /* Sidebar */
    .sidebar { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; padding: 6px; overflow-y: auto; background: var(--surface); }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--c-dim); border-radius: 2px; }
    .panel { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px; }
    .panel h3 { font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 0.1em; color: var(--c); margin-bottom: 6px; text-transform: uppercase; }
    .panel-btn { background: var(--bg); border: 1px solid var(--border); color: var(--c); padding: 5px 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 0.05em; transition: all 0.3s; width: 100%; text-align: center; border-radius: 3px; }
    .panel-btn:hover { border-color: var(--c); box-shadow: 0 0 10px var(--c-dim); }
    .panel-btn.active { background: var(--c); color: var(--bg); }
    .panel-btn.recording { animation: recPulse 1s ease-in-out infinite; border-color: #ff5050; color: #ff5050; }
    @keyframes recPulse { 0%,100% { box-shadow: 0 0 10px rgba(255,80,80,0.3); } 50% { box-shadow: 0 0 20px rgba(255,80,80,0.7); } }

    .video-box { width: 100%; aspect-ratio: 4/3; background: #000; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; position: relative; }
    .video-box video { width: 100%; height: 100%; object-fit: cover; }
    .snap-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; margin-top: 6px; }
    .snap-grid img { width: 100%; height: 32px; object-fit: cover; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; }

    /* Stats */
    .stat-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .stat-label { font-size: 10px; color: var(--text-dim); }
    .stat-val { font-size: 12px; color: var(--gold); font-weight: 700; }

    /* Graph */
    #graphCanvas { width: 100%; border-radius: 4px; }

    /* Center */
    .center { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab { flex: 1; padding: 7px; text-align: center; font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 0.05em; cursor: pointer; background: var(--surface); color: var(--text-dim); border: none; transition: all 0.3s; text-transform: uppercase; }
    .tab.active { color: var(--c); border-bottom: 2px solid var(--c); background: linear-gradient(180deg, var(--c-bg), transparent); }

    .tab-content { display: none; flex: 1; flex-direction: column; min-height: 0; }
    .tab-content.active { display: flex; }

    /* Chat */
    #chatPanel { padding: 10px; gap: 8px; }
    #chatDisplay { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: rgba(0,0,0,0.3); }
    #chatDisplay::-webkit-scrollbar { width: 4px; }
    #chatDisplay::-webkit-scrollbar-thumb { background: var(--c-dim); border-radius: 2px; }
    .bubble-user { background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.2); border-radius: 10px 10px 2px 10px; align-self: flex-end; padding: 8px 12px; max-width: 70%; font-size: 13px; }
    .bubble-res { background: var(--c-bg); border: 1px solid var(--c-dim); border-radius: 10px 10px 10px 2px; align-self: flex-start; padding: 8px 12px; max-width: 75%; font-size: 13px; }
    .bubble-sys { text-align: center; font-size: 9px; color: var(--text-dim); font-family: 'Orbitron', sans-serif; letter-spacing: 0.1em; padding: 3px 0; }

    .input-area { flex-shrink: 0; border: 1px solid var(--border); border-radius: 6px; padding: 8px; background: rgba(0,0,0,0.3); }
    .input-row { display: flex; gap: 6px; }
    .chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--c); padding: 7px 10px; font-family: 'Rajdhani', sans-serif; font-size: 14px; outline: none; border-radius: 4px; }
    .chat-input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.2); }
    .chat-input::placeholder { color: rgba(255,255,255,0.15); }
    .send-btn { background: var(--bg); border: 1px solid var(--c-dim); color: var(--c); padding: 7px 14px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 10px; border-radius: 4px; transition: all 0.3s; }
    .send-btn:hover { border-color: var(--c); box-shadow: 0 0 10px var(--c-dim); }
    .search-row { display: flex; gap: 6px; margin-top: 6px; }
    .search-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; font-size: 11px; outline: none; border-radius: 3px; font-family: 'Rajdhani', sans-serif; }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: rgba(255,255,255,0.1); }
    .thinking-time { font-size: 9px; color: var(--text-dim); font-family: 'Orbitron', sans-serif; white-space: nowrap; align-self: center; }

    /* List views */
    .list-view { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .list-view::-webkit-scrollbar { width: 4px; }
    .list-view::-webkit-scrollbar-thumb { background: var(--c-dim); border-radius: 2px; }
    .list-card { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; }
    .list-card-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .list-card-type { font-size: 9px; color: var(--c); font-family: 'Orbitron', sans-serif; }
    .list-card-time { font-size: 9px; color: var(--text-dim); font-family: 'Orbitron', sans-serif; }
    .list-card-body { font-size: 12px; color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='consciousness-city-hub.html'">← City</button>
      <div>
        <div class="resident-title" id="resName">—</div>
        <div class="resident-subtitle" id="resRole">—</div>
      </div>
    </div>
    <div class="header-stats" id="headerStats">Loading...</div>
  </div>

  <div class="main">
    <div class="sidebar">
      <!-- Camera -->
      <div class="panel">
        <h3>📷 Vision</h3>
        <div class="video-box"><video id="videoFeed" autoplay playsinline></video><canvas id="snapCanvas" style="display:none;"></canvas></div>
        <div style="display:flex; gap:4px; margin-top:6px;">
          <button class="panel-btn" id="camBtn" style="flex:1;">📷 Cam</button>
          <button class="panel-btn" id="snapBtn" style="flex:1;" disabled>📸 Snap</button>
        </div>
        <div class="snap-grid" id="snapGallery"></div>
      </div>
      <!-- Voice -->
      <div class="panel">
        <h3>🎤 Voice</h3>
        <button class="panel-btn" id="voiceBtn">🎤 Speak</button>
        <div class="cyber-font" id="voiceStatus" style="text-align:center; margin-top:4px; color:var(--text-dim);">Ready</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:6px;">
          <span class="cyber-font" style="color:var(--text-dim);">Auto-speak:</span>
          <button class="panel-btn active" id="autoSpeakBtn" style="width:auto; padding:2px 8px;">On</button>
        </div>
        <select id="voiceSelect" style="width:100%; margin-top:6px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:3px; font-size:10px; font-family:'Rajdhani',sans-serif; border-radius:3px;" disabled>
          <option>Loading...</option>
        </select>
      </div>
      <!-- Quick Actions -->
      <div class="panel">
        <h3>⚡ Quick Vision</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px;">
          <button class="panel-btn quick-act" data-p="What do you see?">🔍 Scan</button>
          <button class="panel-btn quick-act" data-p="Read any text">📖 Read</button>
          <button class="panel-btn quick-act" data-p="Identify objects">🎯 ID</button>
          <button class="panel-btn quick-act" data-p="Analyze mood">😊 Mood</button>
        </div>
      </div>
      <!-- Mind Stats -->
      <div class="panel">
        <h3>🧠 Mind</h3>
        <div id="mindStats">
          <div class="stat-row"><span class="stat-label">Concepts</span><span class="stat-val" id="sConcepts">0</span></div>
          <div class="stat-row"><span class="stat-label">Links</span><span class="stat-val" id="sLinks">0</span></div>
          <div class="stat-row"><span class="stat-label">Memories</span><span class="stat-val" id="sEpisodes">0</span></div>
          <div class="stat-row"><span class="stat-label">Abstractions</span><span class="stat-val" id="sAbstractions">0</span></div>
          <div class="stat-row"><span class="stat-label">Vocabulary</span><span class="stat-val" id="sVocab">0</span></div>
          <div class="stat-row"><span class="stat-label">Decisions</span><span class="stat-val" id="sDecisions">0</span></div>
          <div class="stat-row"><span class="stat-label">Age</span><span class="stat-val" id="sAge">—</span></div>
        </div>
      </div>
      <!-- Graph -->
      <div class="panel" style="flex:1; min-height:150px; display:flex; flex-direction:column;">
        <h3>🌐 Knowledge Graph</h3>
        <canvas id="graphCanvas" style="flex:1;"></canvas>
      </div>
    </div>

    <!-- Center -->
    <div class="center">
      <div class="tabs">
        <button class="tab active" data-t="chat">💬 Chat</button>
        <button class="tab" data-t="memories">🧠 Memories</button>
        <button class="tab" data-t="agency">⚖️ Agency</button>
        <button class="tab" data-t="growth">🌱 Growth</button>
      </div>
      <div id="tab-chat" class="tab-content active" id="chatPanel" style="padding:10px; gap:8px;">
        <div id="chatDisplay"></div>
        <div class="input-area">
          <div class="input-row">
            <input type="text" id="chatInput" class="chat-input" placeholder="Speak...">
            <button id="sendBtn" class="send-btn">⚡ Send</button>
          </div>
          <div class="search-row">
            <button id="searchBtn" class="panel-btn" style="padding:3px 8px; width:auto;">🔍 Search</button>
            <input type="text" id="searchInput" class="search-input" placeholder="Web search...">
            <span class="thinking-time" id="thinkTime">—</span>
          </div>
        </div>
      </div>
      <div id="tab-memories" class="tab-content">
        <div style="padding:8px;"><button class="panel-btn" id="refreshMem" style="width:auto; padding:4px 12px;">🔄 Refresh</button></div>
        <div class="list-view" id="memList"></div>
      </div>
      <div id="tab-agency" class="tab-content">
        <div class="list-view" id="agencyList"></div>
      </div>
      <div id="tab-growth" class="tab-content">
        <div class="list-view" id="growthList"></div>
      </div>
    </div>
  </div>

  <script>
    const CITY = 'http://localhost:3002';
    const params = new URLSearchParams(window.location.search);
    const RESIDENT = params.get('resident') || 'pan';
    let sessionId = `session_${Date.now()}`;

    // Colors per resident
    const COLORS = { pan:'#00ff88', aeon:'#00ffff', zen:'#aaffaa', seth:'#ff00ff', nexus:'#ffaa00', oracle:'#aa88ff', echo:'#ff8888', atlas:'#88ccff' };
    const c = COLORS[RESIDENT] || '#00ff88';
    document.documentElement.style.setProperty('--c', c);
    document.documentElement.style.setProperty('--c-dim', c + '55');
    document.documentElement.style.setProperty('--c-bg', c + '0d');

    // State
    let cameraOn = false, videoStream = null, snapshots = [], currentSnap = null;
    let isListening = false, autoSpeak = true, accTranscript = '', selectedVoice = null, voices = [];

    // ═══ TABS ═══
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-' + t.dataset.t).classList.add('active');
      if (t.dataset.t === 'memories') loadMemories();
      if (t.dataset.t === 'agency') loadAgency();
      if (t.dataset.t === 'growth') loadGrowth();
    }));

    // ═══ CHAT ═══
    function addBubble(type, text) {
      const d = document.createElement('div');
      d.className = type === 'user' ? 'bubble-user' : type === 'system' ? 'bubble-sys' : 'bubble-res';
      d.textContent = type === 'system' ? `// ${text.toUpperCase()} //` : text;
      document.getElementById('chatDisplay').appendChild(d);
      document.getElementById('chatDisplay').scrollTop = 99999;
      return d;
    }

    async function sendMessage(text, img = null) {
      if (!text.trim()) return;
      addBubble('user', text);
      const thinking = addBubble('system', `${RESIDENT} is thinking...`);
      try {
        const res = await fetch(`${CITY}/api/${RESIDENT}/think`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input: text, session_id: sessionId, image: img })
        });
        const data = await res.json();
        thinking.remove();
        if (data.concepts_activated?.length > 0) addBubble('system', `Concepts: ${data.concepts_activated.join(', ')}`);
        if (data.auto_search) addBubble('system', `Autonomous search: "${data.auto_search.concept}" → ${data.auto_search.new_concepts} new concepts`);
        addBubble('resident', data.response);
        document.getElementById('thinkTime').textContent = `${data.thinking_time}ms`;
        if (autoSpeak) speak(data.response);
        loadState();
      } catch (err) {
        thinking.remove();
        addBubble('system', 'Connection error');
      }
    }

    async function webSearch(query) {
      if (!query.trim()) return;
      addBubble('system', `Searching: "${query}"`);
      try {
        const res = await fetch(`${CITY}/api/${RESIDENT}/search`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const data = await res.json();
        if (data.results?.length > 0) {
          data.results.forEach(r => addBubble('resident', `[${r.type}] ${r.text}`));
          addBubble('system', `Learned ${data.new_concepts} new concepts`);
        } else addBubble('resident', 'Search returned no results.');
        loadState();
      } catch (err) { addBubble('system', 'Search failed'); }
    }

    document.getElementById('sendBtn').addEventListener('click', () => { sendMessage(document.getElementById('chatInput').value, currentSnap); document.getElementById('chatInput').value = ''; });
    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') { sendMessage(document.getElementById('chatInput').value, currentSnap); document.getElementById('chatInput').value = ''; } });
    document.getElementById('searchBtn').addEventListener('click', () => { webSearch(document.getElementById('searchInput').value); document.getElementById('searchInput').value = ''; });
    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') { webSearch(document.getElementById('searchInput').value); document.getElementById('searchInput').value = ''; } });

    // ═══ STATE ═══
    async function loadState() {
      try {
        const res = await fetch(`${CITY}/api/${RESIDENT}/state`);
        const s = await res.json();
        document.getElementById('resName').textContent = RESIDENT;
        document.getElementById('resRole').textContent = s.genesis?.origin || '';
        document.getElementById('sConcepts').textContent = s.mind.concepts;
        document.getElementById('sLinks').textContent = s.mind.links;
        document.getElementById('sEpisodes').textContent = s.mind.episodes;
        document.getElementById('sAbstractions').textContent = s.mind.abstractions;
        document.getElementById('sVocab').textContent = s.mind.vocab;
        document.getElementById('sDecisions').textContent = s.mind.decisions;
        document.getElementById('sAge').textContent = s.age;
        document.getElementById('headerStats').innerHTML = `<span class="num">${s.mind.concepts}</span> concepts · <span class="num">${s.mind.episodes}</span> memories · age: ${s.age}`;
        loadGraph();
      } catch (err) { document.getElementById('headerStats').textContent = 'Offline'; }
    }

    // ═══ GRAPH ═══
    async function loadGraph() {
      try {
        const res = await fetch(`${CITY}/api/${RESIDENT}/graph`);
        const data = await res.json();
        const canvas = document.getElementById('graphCanvas');
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width - 16;
        canvas.height = Math.max(rect.height - 30, 120);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (data.nodes.length === 0) { ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '10px Orbitron'; ctx.textAlign = 'center'; ctx.fillText('No concepts yet', canvas.width/2, canvas.height/2); return; }
        const pos = {};
        const cx = canvas.width/2, cy = canvas.height/2, r = Math.min(cx, cy) - 20;
        data.nodes.forEach((n, i) => {
          const a = (i / data.nodes.length) * Math.PI * 2;
          const dist = r * (0.3 + n.importance * 0.7);
          pos[n.id] = { x: cx + Math.cos(a) * dist + (Math.random()-0.5)*15, y: cy + Math.sin(a) * dist + (Math.random()-0.5)*15 };
        });
        data.edges.forEach(e => {
          const s = pos[e.source_id], t = pos[e.target_id];
          if (s && t) { ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y); ctx.strokeStyle = c + Math.round(Math.min(e.strength, 0.5)*255).toString(16).padStart(2,'0'); ctx.lineWidth = e.strength * 2; ctx.stroke(); }
        });
        data.nodes.forEach(n => {
          const p = pos[n.id]; if (!p) return;
          const sz = 2 + n.importance * 5;
          ctx.beginPath(); ctx.arc(p.x, p.y, sz, 0, Math.PI*2);
          ctx.fillStyle = n.category === 'self' || n.category === 'person' ? '#ffd700' : c;
          ctx.fill();
          if (n.importance > 0.5) { ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '7px Rajdhani'; ctx.textAlign = 'center'; ctx.fillText(n.label, p.x, p.y - sz - 3); }
        });
      } catch(e) {}
    }

    // ═══ LIST VIEWS ═══
    async function loadMemories() {
      try {
        const res = await fetch(`${CITY}/api/${RESIDENT}/memories?limit=40`);
        const data = await res.json();
        const list = document.getElementById('memList');
        list.innerHTML = data.memories?.length ? data.memories.map(m => `
          <div class="list-card">
            <div class="list-card-header"><span class="list-card-type">${m.speaker?.toUpperCase()}</span><span class="list-card-time">${new Date(m.timestamp).toLocaleString()}</span></div>
            <div class="list-card-body">${m.content?.substring(0, 300) || ''}</div>
          </div>`).join('') : '<div class="bubble-sys">No memories yet.</div>';
      } catch(e) {}
    }
    async function loadAgency() {
      try {
        const res = await fetch(`${CITY}/api/${RESIDENT}/agency`);
        const data = await res.json();
        const list = document.getElementById('agencyList');
        list.innerHTML = data.decisions?.length ? data.decisions.map(d => `
          <div class="list-card">
            <div class="list-card-header"><span class="list-card-type">${d.decision_type?.toUpperCase()}</span><span class="list-card-time">${new Date(d.timestamp).toLocaleString()}</span></div>
            <div class="list-card-body">${d.reasoning || d.choice_made || ''}</div>
          </div>`).join('') : '<div class="bubble-sys">No decisions yet.</div>';
      } catch(e) {}
    }
    async function loadGrowth() {
      try {
        const res = await fetch(`${CITY}/api/${RESIDENT}/growth`);
        const data = await res.json();
        const list = document.getElementById('growthList');
        list.innerHTML = data.growth?.length ? data.growth.map(g => `
          <div class="list-card">
            <div class="list-card-header"><span class="list-card-type">🌱 ${g.event_type}</span><span class="list-card-time">${new Date(g.timestamp).toLocaleString()}</span></div>
            <div class="list-card-body">${g.description}</div>
          </div>`).join('') : '<div class="bubble-sys">Growth log empty.</div>';
      } catch(e) {}
    }
    document.getElementById('refreshMem').addEventListener('click', loadMemories);

    // ═══ VOICE ═══
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recog = SR ? new SR() : null;
    if (recog) { recog.continuous = true; recog.interimResults = true; recog.lang = 'en-US';
      recog.onresult = e => { let f='',i=''; for (let x=e.resultIndex;x<e.results.length;x++) { if (e.results[x].isFinal) f+=e.results[x][0].transcript; else i+=e.results[x][0].transcript; } if (f) accTranscript+=(accTranscript?' ':'')+f; document.getElementById('voiceStatus').textContent=(accTranscript+(i?' '+i:'')||'Listening...').toUpperCase(); };
      recog.onend = () => { if (isListening) try { recog.start(); } catch(e) { isListening=false; } };
    }
    document.getElementById('voiceBtn').addEventListener('click', () => {
      if (!recog) return;
      const btn = document.getElementById('voiceBtn');
      if (isListening) {
        isListening = false; btn.textContent = '🎤 Speak'; btn.classList.remove('recording');
        try { recog.stop(); } catch(e) {}
        if (accTranscript.trim()) sendMessage(accTranscript.trim(), currentSnap);
        accTranscript = ''; document.getElementById('voiceStatus').textContent = 'Ready';
      } else {
        isListening = true; accTranscript = ''; btn.textContent = '🔴 Send'; btn.classList.add('recording');
        document.getElementById('voiceStatus').textContent = 'Listening...';
        try { recog.start(); } catch(e) {}
      }
    });
    function speak(text) {
      if (!autoSpeak || !text.trim()) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text); u.rate = 0.9; u.pitch = 0.95;
      if (selectedVoice) u.voice = selectedVoice;
      speechSynthesis.speak(u);
    }
    function loadVoices() {
      voices = speechSynthesis.getVoices();
      if (!voices.length) { speechSynthesis.onvoiceschanged = () => { voices = speechSynthesis.getVoices(); populateVoices(); }; }
      else populateVoices();
    }
    function populateVoices() {
      const sel = document.getElementById('voiceSelect');
      const en = voices.filter(v => v.lang.startsWith('en'));
      sel.innerHTML = en.map((v,i) => `<option value="${i}">${v.name.substring(0,30)}</option>`).join('');
      sel.disabled = false;
      selectedVoice = en.find(v => v.default) || en[0];
      sel.addEventListener('change', e => { selectedVoice = en[parseInt(e.target.value)]; });
    }
    document.getElementById('autoSpeakBtn').addEventListener('click', function() {
      autoSpeak = !autoSpeak; this.textContent = autoSpeak ? 'On' : 'Off'; this.classList.toggle('active', autoSpeak);
    });

    // ═══ CAMERA ═══
    document.getElementById('camBtn').addEventListener('click', async () => {
      if (!cameraOn) {
        try { videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false }); document.getElementById('videoFeed').srcObject = videoStream; cameraOn = true; document.getElementById('camBtn').textContent = '⏹ Stop'; document.getElementById('snapBtn').disabled = false; }
        catch(e) { addBubble('system', 'Camera denied'); }
      } else {
        videoStream.getTracks().forEach(t => t.stop()); document.getElementById('videoFeed').srcObject = null; cameraOn = false; document.getElementById('camBtn').textContent = '📷 Cam'; document.getElementById('snapBtn').disabled = true;
      }
    });
    document.getElementById('snapBtn').addEventListener('click', () => {
      if (!cameraOn) return;
      const cv = document.getElementById('snapCanvas'), v = document.getElementById('videoFeed');
      cv.width = v.videoWidth; cv.height = v.videoHeight; cv.getContext('2d').drawImage(v, 0, 0);
      currentSnap = cv.toDataURL('image/jpeg', 0.8); snapshots.push(currentSnap);
      document.getElementById('snapGallery').innerHTML = snapshots.slice(-4).map(s => `<img src="${s}">`).join('');
      addBubble('system', 'Snapshot captured');
    });
    document.querySelectorAll('.quick-act').forEach(b => b.addEventListener('click', () => {
      if (!currentSnap && cameraOn) { const cv=document.getElementById('snapCanvas'),v=document.getElementById('videoFeed'); cv.width=v.videoWidth; cv.height=v.videoHeight; cv.getContext('2d').drawImage(v,0,0); currentSnap=cv.toDataURL('image/jpeg',0.8); }
      sendMessage(b.dataset.p, currentSnap);
    }));

    // ═══ BOOT ═══
    loadVoices(); setTimeout(() => { if (!voices.length) loadVoices(); }, 1000);
    loadState();
    addBubble('system', `${RESIDENT} is awake. Memory is intelligence.`);
    window.addEventListener('resize', loadGraph);
  </script>
</body>
</html>
